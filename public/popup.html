<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoSlay</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 420px;
        height: 600px;
        overflow: hidden;
        background: #080808;
        font-family: 'Inter', sans-serif;
      }

      .popup-wrapper {
        width: 420px;
        height: 600px;
        display: flex;
        flex-direction: column;
        background: #080808;
      }

      /* Top bar */
      .popup-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: #0f0f0f;
        border-bottom: 1px solid #1f1f1f;
        flex-shrink: 0;
      }

      .popup-topbar .brand {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .popup-topbar .brand img {
        width: 22px;
        height: 22px;
        border-radius: 4px;
      }

      .popup-topbar .brand span {
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.02em;
      }

      .popup-topbar .actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .popup-topbar .actions a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        color: #888;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
        cursor: pointer;
        background: transparent;
        border: none;
      }

      .popup-topbar .actions a:hover {
        background: #1f1f1f;
        color: #fff;
      }

      /* iframe container */
      .iframe-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        background: #080808;
      }

      /* Loading overlay */
      .loading-overlay {
        position: absolute;
        inset: 0;
        background: #080808;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 10;
        transition: opacity 0.3s ease;
      }

      .loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #1f1f1f;
        border-top-color: #a855f7;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      .loading-text {
        font-size: 13px;
        color: #555;
        letter-spacing: 0.03em;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Open in tab button */
      .open-tab-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: #666;
        background: #161616;
        border: 1px solid #2a2a2a;
        border-radius: 5px;
        padding: 4px 9px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
      }

      .open-tab-btn:hover {
        color: #fff;
        border-color: #444;
        background: #1f1f1f;
      }
    </style>
  </head>
  <body>
    <div class="popup-wrapper">

      <!-- Top bar -->
      <div class="popup-topbar">
        <div class="brand">
          <img src="icon48.png" alt="AutoSlay" />
          <span>AutoSlay</span>
        </div>
        <div class="actions">
          <a href="https://autoslay.vercel.app" target="_blank" title="Open in new tab" class="open-tab-btn">
            <!-- External link icon -->
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            Open site
          </a>
        </div>
      </div>

      <!-- iframe -->
      <div class="iframe-container">
        <!-- Loading spinner shown until iframe loads -->
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
          <span class="loading-text">Loading AutoSlay…</span>
        </div>

        <iframe
          id="siteFrame"
          src="https://autoslay.vercel.app"
          title="AutoSlay"
          allow="clipboard-read; clipboard-write"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
        ></iframe>
      </div>

    </div>

    <script>
      const iframe = document.getElementById('siteFrame');
      const overlay = document.getElementById('loadingOverlay');

      iframe.addEventListener('load', () => {
        overlay.classList.add('hidden');
      });

      // Fallback: hide overlay after 6 seconds no matter what
      setTimeout(() => overlay.classList.add('hidden'), 6000);
    </script>
  </body>
</html>
