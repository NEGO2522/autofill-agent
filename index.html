<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fillux — Smart form autofill. Fill any web form instantly." />
    <title>Fillux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: #080808;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }
      #root { height: 100%; }

      /* ── Chrome Extension popup: fix dimensions ──
         Chrome sets the popup width/height from the content.
         We set the popup body to exactly 360px wide so it renders
         cleanly without scrollbars or weird sizing.
      */
      body.is-extension {
        width: 360px;
        min-height: 480px;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- External script: avoids CSP inline-script violation in MV3 extensions -->
    <script src="./init.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
